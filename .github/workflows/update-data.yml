name: Update KBO data

on:
  schedule:
    # 매일 00:30 KST (15:30 UTC) — 당일 경기 종료 후
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install requests beautifulsoup4
      - name: Scrape KBO data
        run: python scraper/scrape_kbo.py
      - name: Commit & push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "데이터 변경 없음 — 배포 생략"
          else
            git commit -m "데이터 자동 갱신: $(TZ=Asia/Seoul date +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      # GITHUB_TOKEN으로 푸시한 커밋은 push 트리거를 발화시키지 않으므로 직접 배포 실행
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
